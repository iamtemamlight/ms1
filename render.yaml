services:
  # ============================================================================
  # Rust Backend Service
  # ============================================================================
  - type: web
    name: allbright-backend
    runtime: docker
    plan: starter
    branch: main
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: RUST_LOG
        value: info
      - key: PILOT_MODE
        value: true
      - key: HTTP_BIND_ADDR
        value: 0.0.0.0:3001
      - key: DATABASE_URL
        fromDatabase:
          name: allbright-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: allbright-redis
          type: redis
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PIMLICO_API_KEY
        sync: false
      - key: PRIVATE_KEY
        sync: false
    disk:
      name: backend-data
      mountPath: /app/data
      sizeGB: 1

  # ============================================================================
  # React Dashboard Service
  # ============================================================================
  - type: web
    name: allbright-dashboard
    runtime: docker
    plan: starter
    branch: main
    rootDir: apps/dashboard
    dockerfilePath: ./apps/dashboard/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: RUST_BACKEND_URL
        fromService:
          type: web
          name: allbright-backend
          property: host
      - key: NODE_ENV
        value: production

  # ============================================================================
  # Redis Cache Service
  # ============================================================================
  - type: redis
    name: allbright-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # ============================================================================
  # PostgreSQL Database Service
  # ============================================================================
  - type: pserv
    name: allbright-db
    plan: starter
    databaseName: allbright
    user: apxuser
    region: oregon
    disk:
      sizeGB: 10