apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allbright-backend-policy
  namespace: allbright
spec:
  podSelector:
    matchLabels:
      app: allbright-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: allbright-dashboard
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 50051
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: allbright-postgres
        - podSelector:
            matchLabels:
              app: allbright-redis
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
