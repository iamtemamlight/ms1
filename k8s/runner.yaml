apiVersion: apps/v1
kind: Deployment
metadata:
  name: allbright-backend
  namespace: allbright
  labels:
    app: allbright-backend
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: allbright-backend
  template:
    metadata:
      labels:
        app: allbright-backend
        tier: backend
    spec:
      containers:
        - name: runner
          image: registry.allbright.internal/sovereign-engine:v2.4-apex
          env:
            - name: CHAIN
              value: {chain}
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
