# AllBright Dashboard — Nginx Production Configuration
# Serves React SPA on port 5200 with HTTPS, proxies API to Rust backend :3001

server {
    listen 5200 ssl;
    server_name localhost;

    # SSL certificates (generate with mkcert for localhost)
    ssl_certificate     ./certs/localhost.pem;
    ssl_certificate_key ./certs/localhost-key.pem;

    # Root directory for built React SPA
    root D:/MS1/AB4/apps/dashboard/dist;
    index index.html;

    # Gzip compression for faster loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Cache static assets aggressively (content-hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # Proxy API calls to Rust production backend on port 3001
    # Rust backend provides real 78 KPI data with sub-0.1ms P50 latency
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Proxy WebSocket connections to Rust backend on port 50052
    location /ws/ {
        proxy_pass http://127.0.0.1:50052;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;  # Long timeout for persistent WS connections
    }

    # SPA fallback — all other routes serve index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ (\.env|\.git|package\.json|package-lock\.json|tsconfig\.json|vite\.config\.ts) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}