# ALLBRIGHT CI/CD Pipeline
# OPTIONAL - Set RUN_WORKFLOW=false to disable automatic runs
# This workflow matches the engine control modes from the dashboard
# and supports optional deployment pipeline

name: ALLBRIGHT CI/CD Pipeline

# OPTIONAL: Only run when explicitly triggered or when running manually
# Set workflow_dispatch to allow manual triggers
on:
  workflow_dispatch:
    inputs:
      run_deployment:
        description: 'Run deployment pipeline (optional)'
        type: boolean
        default: false
        default: false
        required: false
      engine_mode:
        description: 'Engine mode (0=SIM, 1=LIVE)'
        type: choice
        options:
          - 'SIM'
          - 'LIVE'
        default: 'SIM'
        required: false
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  # Optional: Comment out to disable scheduled runs entirely
  # schedule:
  #   - cron: '0 0 * * 0'  # Weekly run (disabled by default)

env:
  # Engine mode from input or environment
  ENGINE_MODE: ${{ github.events.inputs.engine_mode || 'SIM' }}
  # Deployment flag
  RUN_DEPLOYMENT: ${{ github.events.inputs.run_deployment || 'false' }}

jobs:
  # ============================================================================
  # OPTIONAL: Build check - runs on every push/PR (always enabled)
  # ============================================================================
  build-check:
    name: Build Check (SIM Mode)
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust@v1
        with:
          toolchain: stable
          
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Check format
        run: cargo fmt --all -- --check
        
      - name: Lint clippy
        run: cargo clippy --all -- -D warnings
        continue-on-error: true
        
      - name: Build release
        run: cargo build --release --locked
        continue-on-error: true
        
  # ============================================================================
  # OPTIONAL: Dashboard build check (TypeScript)
  # ============================================================================
  dashboard-build:
    name: Dashboard Build Check
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Type check
        run: npm run dashboard:typecheck
        continue-on-error: true
        
      - name: Build dashboard
        run: npm run dashboard:build
        continue-on-error: true
        
  # ============================================================================
  # OPTIONAL: Desktop (Tauri) build - Linux/macOS
  # ============================================================================
  desktop-build:
    name: Desktop Build (Tauri) - Linux/macOS
    runs-on: ubuntu-latest
    # Only run if cargo build succeeded
    needs: build-check
    if: needs.build-check.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust@v1
        with:
          toolchain: stable
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Rust stable
        run: rustup default stable
        
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
        
      - name: Build Tauri app
        run: npm run tauri:build
        continue-on-error: true
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installer-linux
          path: src-tauri/target/release/bundle/
          
  # ============================================================================
  # OPTIONAL: Windows Installer Build (MSI + NSIS) - REQUIRES WINDOWS RUNNER
  # ============================================================================
  windows-installer-build:
    name: Windows Installer Build (MSI + NSIS)
    runs-on: windows-latest
    needs: build-check
    if: needs.build-check.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust@v1
        with:
          toolchain: stable
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest
        
      - name: Build Tauri Windows Installers
        run: npm run tauri:build
        continue-on-error: true
        
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installer-msi
          path: src-tauri/target/release/bundle/msi/
          
      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installer-nsis
          path: src-tauri/target/release/bundle/nsis/
          
  # ============================================================================
  # OPTIONAL: Full test suite
  # ============================================================================
  test-suite:
    name: Test Suite (SIM Mode)
    runs-on: ubuntu-latest
    needs: build-check
    if: needs.build-check.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust@v1
        with:
          toolchain: stable
          
      - name: Run tests
        run: cargo test --all -- --test-threads=1
        continue-on-error: true
        
  # ============================================================================
  # OPTIONAL: Docker build
  # ============================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-check
    if: needs.build-check.result == 'success' && env.RUN_DEPLOYMENT != 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: allbright/c2:latest
          
      - name: Save Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar
          
  # ============================================================================
  # OPTIONAL: Deployment pipeline (only when RUN_DEPLOYMENT=true)
  # This pipeline matches the Dashboard Engine Control modes
  # ============================================================================
  deployment:
    name: Deployment Pipeline
    runs-on: ubuntu-latest
    needs: [build-check, dashboard-build, desktop-build, windows-installer-build]
    # OPTIONAL: Only runs when explicitly triggered or RUN_DEPLOYMENT=true
    if: |
      (needs.build-check.result == 'success' && 
       needs.dashboard-build.result == 'success' &&
       (needs.desktop-build.result == 'success' || needs.desktop-build.result == 'skipped')) &&
      env.RUN_DEPLOYMENT == 'true'
    
